name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18-trixie
        env:
          POSTGRES_DB: booknotes_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d booknotes_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20

    env:
      TEST_POSTGRES_CONNECTION: Host=localhost;Port=5432;Database=booknotes_test;Username=postgres;Password=postgres

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore book-notes-ia.sln

      - name: Test WebApp
        run: dotnet test WebApp.Tests/WebApp.Tests.csproj --no-restore --logger "trx;LogFileName=test-results.trx" --logger "console;verbosity=minimal"

      - name: Test TtsService
        run: dotnet test services/TtsService.Tests/TtsService.Tests.csproj --no-restore --logger "trx;LogFileName=test-results.trx" --logger "console;verbosity=minimal"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            WebApp.Tests/TestResults/test-results.trx
            services/TtsService.Tests/TestResults/test-results.trx
